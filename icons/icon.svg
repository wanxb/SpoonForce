<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#5856d6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Spoon shape -->
  <g transform="translate(256,256) rotate(-30)">
    <!-- Bowl -->
    <ellipse cx="0" cy="-80" rx="65" ry="50" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Handle -->
    <rect x="-16" y="-35" width="32" height="180" rx="16" fill="rgba(255,255,255,0.85)"/>
    <!-- Handle end -->
    <ellipse cx="0" cy="145" rx="20" ry="12" fill="rgba(255,255,255,0.85)"/>
  </g>
  <!-- Weight text -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="48" font-weight="700" fill="rgba(255,255,255,0.95)">SCALE</text>
</svg>
